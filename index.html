<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahid Ahmed | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-blob"></div>

    <div id="header-placeholder"></div>
    <div id="hero-placeholder"></div>
    <div id="about-placeholder"></div>
    <div id="experience-placeholder"></div>
    <div id="skills-placeholder"></div>
    <div id="projects-placeholder"></div>
    <div id="contact-placeholder"></div>
    <div id="footer-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <script>
        // List of all component files
        const components = [
            { id: 'header-placeholder', file: 'components/header.html' },
            { id: 'hero-placeholder', file: 'components/hero.html' },
            { id: 'about-placeholder', file: 'components/about.html' },
            { id: 'experience-placeholder', file: 'components/experience.html' },
            { id: 'skills-placeholder', file: 'components/skills.html' },
            { id: 'projects-placeholder', file: 'components/projects.html' },
            { id: 'contact-placeholder', file: 'components/contact.html' },
            { id: 'footer-placeholder', file: 'components/footer.html' },
            { id: 'sidebar-placeholder', file: 'components/sidebar.html' }
        ];

        // Fetch all components simultaneously
        Promise.all(components.map(comp => 
            fetch(comp.file)
                .then(response => response.text())
                .then(data => {
                    document.getElementById(comp.id).innerHTML = data;
                })
        )).then(() => {
            // This runs ONLY AFTER all HTML is injected into the page.
            
            // 1. Set the dynamic footer date
            document.getElementById('real_date').innerHTML = new Date().getFullYear();

            // 2. Inject script.js so it can correctly find the elements (like typing-text)
            const mainScript = document.createElement('script');
            mainScript.src = 'script.js';
            document.body.appendChild(mainScript);
        });
    </script>
</body>
</html>
